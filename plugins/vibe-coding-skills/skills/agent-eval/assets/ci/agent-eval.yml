# GitHub Actions: the automatic eval gate.
# Copy this into your project's .github/workflows/ and set the <feature> path below.
# Pull requests run a quick SAMPLE (cheap); pushes to master run the FULL set (thorough).
# Requires the repo secret ANTHROPIC_API_KEY (Settings -> Secrets and variables -> Actions).

name: agent-eval gate

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install anthropic pyyaml
      - name: Run agent-eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # On PRs: quick sample + all critical cases. On master: full set.
          if [ "${{ github.event_name }}" = "push" ]; then MODE=--full; else MODE=--sample; fi
          python evals/eval_runner.py evals/<feature> $MODE --ci
