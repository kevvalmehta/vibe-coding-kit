name: CI

# Runs automatically on every push and pull request.
# - Security: Semgrep scans the code for vulnerabilities (BLOCKING).
# - Lint: ruff catches real Python bugs (skipped if the project has no Python).
# - Lint: Biome + tsc catch real JS/TS bugs (skipped if the project has no JS/TS).
# - Tests: runs Node and/or Python tests if the project has them.
# - Plan gate (PRs only): the newest specs/*/tasks.md must have every task checked
#   off before merge — no half-done feature lands on main (spec 016 Phase 2).

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  security:
    name: Security scan (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        # BLOCKING (spec 016 Phase 2): a security finding fails the build. A security
        # gate that only reports is a gate the model (and a rushed human) can ignore.
        # Hit a false positive? Add an inline `# nosemgrep: <rule-id>` comment with a
        # one-line justification instead of turning the gate back off.
        continue-on-error: false
        run: semgrep scan --config auto --error

  lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Both steps only run when the project actually has Python files.
      - name: Setup Python
        if: ${{ hashFiles('**/*.py') != '' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Run ruff
        # BLOCKING: ruff's default rules flag real bugs (undefined names,
        # unused imports, syntax errors) and almost never false-positive.
        if: ${{ hashFiles('**/*.py') != '' }}
        run: |
          pip install ruff
          ruff check .

  lint-js:
    name: JS/TS lint (Biome + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # All steps only run when the project actually has JS/TS code.
      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Run Biome
        # BLOCKING: Biome's recommended rules flag real bugs (const reassign,
        # unreachable code, debugger statements) and rarely false-positive.
        if: ${{ hashFiles('package.json') != '' }}
        # Version pinned to match the $schema in biome.json — bump both together.
        run: npx --yes @biomejs/biome@2.4.16 lint .
      - name: TypeScript type check
        # tsc proves the pieces fit together (wrong types, missing fields)
        # before the app ever runs. Only fires on TypeScript projects.
        if: ${{ hashFiles('tsconfig.json') != '' }}
        run: |
          npm ci || npm install
          npx tsc --noEmit

  deps-audit:
    name: Dependency vulnerability audit
    # BLOCKING (spec 016 Phase 3): a dependency with a known CVE fails the build.
    # Both steps skip automatically when the project has no deps of that kind.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Python
        if: ${{ hashFiles('requirements.txt') != '' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Python dependency audit (pip-audit)
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
        shell: bash
      - name: Setup Node
        if: ${{ hashFiles('package-lock.json') != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Node dependency audit (npm audit)
        # high threshold keeps low-severity noise from blocking; real holes still do.
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm audit --audit-level=high

  plan-gate:
    name: Plan gate (all tasks done before merge)
    # PRs only: mid-feature pushes to a branch may legitimately have open tasks;
    # a merge to main must not.
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check newest tasks.md is fully done
        if: ${{ hashFiles('specs/**/tasks.md') != '' }}
        shell: pwsh
        run: ./plugins/vibe-coding-skills/scripts/check-plan.ps1 -Gate

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ---- Node / JavaScript projects ----
      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Node install & test
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          npm ci || npm install
          npm test --if-present

      # ---- Python projects ----
      - name: Setup Python
        if: ${{ hashFiles('**/*.py') != '' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Python install & test
        if: ${{ hashFiles('**/*.py') != '' }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest
          # Run the suite. Block on real failures; tolerate "no tests collected" (pytest exit 5).
          rc=0; pytest || rc=$?
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 5 ]; then exit "$rc"; fi
        shell: bash
